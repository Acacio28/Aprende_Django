{% extends "base.html" %}
{% block title %}Lista Docente{% endblock %}
{% block content %}
<h1>Lista Docente</h1>
<a href="{% url 'add_docente' %}" class="btn btn-success mb-3">Aumenta Docente</a>
<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr><th>NRE</th><th>Naran</th><th>Sexu</th><th>Materia</th><th>Aksaun</th></tr>
    </thead>
    <tbody>
        {% for x in docentes %}
        <tr>
            <td>{{ x.nre }}</td>
            <td>{{ x.naran_docente }}</td>
            <td>{{ x.sexu }}</td>
            <td>{{ x.materia }}</td>
            <td>
                <a href="{% url 'edit_docente' x.id %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'delete_docente' x.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Apaga</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
