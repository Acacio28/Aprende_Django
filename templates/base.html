<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema Escolar{% endblock %}</title>
    <link rel="stylesheet" href="/static/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/assets/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">Sistema Escolar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista' %}">Estudante</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_docente' %}">Docente</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Akademiku</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{% url 'lista_turma' %}">Turma</a></li>
                            <li><a class="dropdown-item" href="{% url 'lista_disciplina' %}">Disciplina</a></li>
                            <li><a class="dropdown-item" href="{% url 'lista_avaliasaun' %}">Avaliasaun</a></li>
                        </ul>
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
<li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
</ul>
                    </li>
                </ul>
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
<li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
</ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block breadcrumb %}{% endblock %}
        {% block content %}{% endblock %}
    </div>
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; {% now "Y" %} Sistema Escolar — Developed by Acacio</p>
    </footer>
    <script src="/static/assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
