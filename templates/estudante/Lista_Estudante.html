<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="text-center">Lista Estudante</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>
<body>
    <div class="container mt-4"></div>
   <h1>Lista Estudante</h1> 
   <a href="{%url 'add'%}" class ="btn btn-success mb-3">Aumenta Estudante</a>
   <table class ='table table-bordered table-striped '> 
        <thead class ='table-dark'>
            <tr>
                <th>NRE</th>
                <th>Naran Estudante</th>
                <th>Hela Fatin</th>
                <th>Numéro Telefone</th>
                <th>Sexu</th>
                <th>Aksaun</th>

            </tr>
        </thead>
        <tbody>
            {%for x in alunos%}
            <tr>
                <td>{{x.nre}}</td>
                <td>{{x.naran_estudante}}</td>
                <td>{{x.hela_fatin}}</td>
                <td>{{x.nu_telefone}}</td>
                <td>{{x.sexu}}</td>
                <td>
                <a href="{% url 'edit' x.id %}" class="btn btn-sm btn-warning">Edit</a>

                </td>
            </tr>
            {%endfor%}
        </tbody>

   </table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
