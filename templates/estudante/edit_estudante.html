{% extends "base.html" %}
{% block title %}Edit Estudante{% endblock %}
{% block content %}
<h1>Edit Estudante</h1>
<form method="POST">
    {% csrf_token %}
    <div class="mb-3"><label>NRE</label><input type="text" name="nre" class="form-control" value="{{ estudante.nre }}" required></div>
    <div class="mb-3"><label>Naran Estudante</label><input type="text" name="naran_estudante" class="form-control" value="{{ estudante.naran_estudante }}" required></div>
    <div class="mb-3"><label>Hela Fatin</label><input type="text" name="hela_fatin" class="form-control" value="{{ estudante.hela_fatin }}"></div>
    <div class="mb-3"><label>Nu Telefone</label><input type="text" name="nu_telefone" class="form-control" value="{{ estudante.nu_telefone }}" required></div>
    <div class="mb-3"><label>Sexu</label>
        <select name="sexu" class="form-control" required>
            <option value="mane" {% if estudante.sexu == "mane" %}selected{% endif %}>Mane</option>
            <option value="feto" {% if estudante.sexu == "feto" %}selected{% endif %}>Feto</option>
        </select>
    </div>
    <div class="mb-3"><label>Turma</label>
        <select name="turma" class="form-control">
            <option value="">-- La iha --</option>
            {% for t in turmas %}
            <option value="{{ t.id }}" {% if estudante.turma_id == t.id %}selected{% endif %}>{{ t.naran_turma }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-warning">Save</button>
    <a href="{% url 'lista' %}" class="btn btn-secondary">Fila</a>
</form>
{% endblock %}
