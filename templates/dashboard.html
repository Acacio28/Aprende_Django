<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/assets/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1 class="text-center mb-4">Dashboard</h1>
    <div class="row">
        <div class="col-md-6">
            <div class="card text-white bg-primary mb-3">
                <div class="card-header">Estudante</div>
                <div class="card-body">
                    <h5 class="card-title display-4">{{ total_estudante }}</h5>
                    <p class="card-text">Total Estudante</p>
                    <a href="/estudante/" class="btn btn-light">View Details</a>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card text-white bg-success mb-3">
                <div class="card-header">Docente</div>
                <div class="card-body">
                    <h5 class="card-title display-4">{{ total_docente }}</h5>
                    <p class="card-text">Total Docente</p>
                    <a href="/docente/" class="btn btn-light">View Details</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
