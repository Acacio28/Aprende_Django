<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Avaliasaun</title>
    <link rel="stylesheet" href="/static/assets/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex gap-2 mb-3">
        <a href="/akademiku/" class="btn btn-info">Dashboard</a>
        <a href="{% url 'add_avaliasaun' %}" class="btn btn-success">Aumenta Avaliasaun</a>
    </div>
    <h1>Lista Avaliasaun</h1>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Estudante</th>
                <th>Disciplina</th>
                <th>Nota</th>
                <th>Data</th>
                <th>Aksaun</th>
            </tr>
        </thead>
        <tbody>
            {% for a in avaliasaun %}
            <tr>
                <td>{{ a.estudante.naran_estudante }}</td>
                <td>{{ a.disciplina.naran_disciplina }}</td>
                <td>{{ a.nota }}</td>
                <td>{{ a.data }}</td>
                <td>
                    <a href="{% url 'edit_avaliasaun' a.id %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'delete_avaliasaun' a.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Apaga</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="5" class="text-center">Dados la iha</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Main Dashboard</a>
</div>
</body>
</html>
