<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Lista Disciplina</title><link rel="stylesheet" href="/static/assets/css/bootstrap.min.css"></head>
<body><div class="container mt-4"><h1>Lista Disciplina</h1><table class="table table-bordered"><thead class="table-dark"><tr><th>Disciplina</th><th>Docente</th><th>Aksaun</th></tr></thead>
<tbody>{% for x in disciplinas %}<tr><td>{{ x.naran_disciplina }}</td><td>{{ x.docente.naran_docente }}</td><td><a href="{% url 'edit_disciplina' x.id %}" class="btn btn-sm btn-warning">Edit</a><a href="{% url 'delete_disciplina' x.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Apaga</a></td></tr>{% endfor %}</tbody>
</table><a href="{% url 'add_disciplina' %}" class="btn btn-success">Aumenta Disciplina</a></div></body></html>
