<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Lista Avaliasaun</title><link rel="stylesheet" href="/static/assets/css/bootstrap.min.css"></head>
<body><div class="container mt-4"><h1>Lista Avaliasaun</h1><table class="table table-bordered"><thead class="table-dark"><tr><th>Estudante</th><th>Disciplina</th><th>Nota</th><th>Aksaun</th></tr></thead>
<tbody>{% for x in avaliasauns %}<tr><td>{{ x.estudante.naran_estudante }}</td><td>{{ x.disciplina.naran_disciplina }}</td><td>{{ x.nota }}</td><td><a href="{% url 'edit_avaliasaun' x.id %}" class="btn btn-sm btn-warning">Edit</a><a href="{% url 'delete_avaliasaun' x.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Apaga</a></td></tr>{% endfor %}</tbody>
</table><a href="{% url 'add_avaliasaun' %}" class="btn btn-success">Aumenta Avaliasaun</a></div></body></html>
