{% extends "base.html" %}
{% block title %}Aumenta Disciplina{% endblock %}
{% block content %}
<h2>Aumenta Disciplina</h2>
<form method="POST">{% csrf_token %}
<div class="mb-3"><label>Naran Disciplina</label><input type="text" name="naran_disciplina" class="form-control" required></div>
<div class="mb-3"><label>Docente</label><select name="docente" class="form-control" required>{% for d in docentes %}<option value="{{ d.id }}">{{ d.naran_docente }}</option>{% endfor %}</select></div>
<button type="submit" class="btn btn-success">Save</button><a href="{% url 'lista_disciplina' %}" class="btn btn-secondary">Fila</a>
</form>
{% endblock %}
