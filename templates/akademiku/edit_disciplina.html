{% extends "base.html" %}
{% block title %}Edit Disciplina{% endblock %}
{% block content %}
<h1>Edit Disciplina</h1>
<form method="POST">{% csrf_token %}
<div class="mb-3"><label>Naran Disciplina</label><input type="text" name="naran_disciplina" class="form-control" value="{{ disciplina.naran_disciplina }}" required></div>
<div class="mb-3"><label>Docente</label><select name="docente" class="form-control" required>{% for d in docentes %}<option value="{{ d.id }}" {% if disciplina.docente_id == d.id %}selected{% endif %}>{{ d.naran_docente }}</option>{% endfor %}</select></div>
<button type="submit" class="btn btn-warning">Save</button><a href="{% url 'lista_disciplina' %}" class="btn btn-secondary">Fila</a>
</form>
{% endblock %}
