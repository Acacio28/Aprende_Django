<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Disciplina</title>
    <link rel="stylesheet" href="/static/assets/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex gap-2 mb-3"><a href="/akademiku/" class="btn btn-info">Dashboard</a></div>
    <h1>Edit Disciplina</h1>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label>Naran Disciplina</label>
            <input type="text" name="naran_disciplina" class="form-control" value="{{ disciplina.naran_disciplina }}" required>
        </div>
        <div class="mb-3">
            <label>Docente</label>
            <select name="docente" class="form-control">
                <option value="">--- Hili Docente ---</option>
                {% for d in docentes %}
                <option value="{{ d.id }}" {% if disciplina.docente_id == d.id %}selected{% endif %}>{{ d.naran_docente }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-warning">Save</button>
        <a href="{% url 'lista_disciplina' %}" class="btn btn-secondary">Fila</a>
    </form>
</div>
</body>
</html>
