{% extends "base.html" %}
{% block title %}Lista Turma{% endblock %}
{% block content %}
<h1>Lista Turma</h1>
<a href="{% url 'add_turma' %}" class="btn btn-success mb-3">Aumenta Turma</a>
<table class="table table-bordered table-striped">
    <thead class="table-dark"><tr><th>Turma</th><th>Ano</th><th>Aksaun</th></tr></thead>
    <tbody>{% for x in turmas %}<tr><td>{{ x.naran_turma }}</td><td>{{ x.ano_letitva }}</td><td><a href="{% url 'edit_turma' x.id %}" class="btn btn-sm btn-warning">Edit</a><a href="{% url 'delete_turma' x.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Apaga</a></td></tr>{% endfor %}</tbody>
</table>
{% endblock %}
