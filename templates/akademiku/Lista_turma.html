<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Lista Turma</title><link rel="stylesheet" href="/static/assets/css/bootstrap.min.css"></head>
<body><div class="container mt-4"><h1>Lista Turma</h1><table class="table table-bordered"><thead class="table-dark"><tr><th>Turma</th><th>Ano</th><th>Aksaun</th></tr></thead>
<tbody>{% for x in turmas %}<tr><td>{{ x.naran_turma }}</td><td>{{ x.ano_letitva }}</td><td><a href="{% url 'edit_turma' x.id %}" class="btn btn-sm btn-warning">Edit</a><a href="{% url 'delete_turma' x.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Apaga</a></td></tr>{% endfor %}</tbody>
</table><a href="{% url 'add_turma' %}" class="btn btn-success">Aumenta Turma</a></div></body></html>
