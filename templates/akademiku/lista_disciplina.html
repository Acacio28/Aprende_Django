<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Disciplina</title>
    <link rel="stylesheet" href="/static/assets/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex gap-2 mb-3">
        <a href="/akademiku/" class="btn btn-info">Dashboard</a>
        <a href="{% url 'add_disciplina' %}" class="btn btn-success">Aumenta Disciplina</a>
    </div>
    <h1>Lista Disciplina</h1>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Naran Disciplina</th>
                <th>Docente</th>
                <th>Aksaun</th>
            </tr>
        </thead>
        <tbody>
            {% for d in disciplinas %}
            <tr>
                <td>{{ d.naran_disciplina }}</td>
                <td>{{ d.docente.naran_docente|default:"-" }}</td>
                <td>
                    <a href="{% url 'edit_disciplina' d.id %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'delete_disciplina' d.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Apaga</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="3" class="text-center">Dados la iha</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Main Dashboard</a>
</div>
</body>
</html>
