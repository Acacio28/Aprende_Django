{% extends "base.html" %}
{% block title %}Edit Avaliasaun{% endblock %}
{% block content %}
<h1>Edit Avaliasaun</h1>
<form method="POST">{% csrf_token %}
<div class="mb-3"><label>Estudante</label><select name="estudante" class="form-control" required>{% for e in estudantes %}<option value="{{ e.id }}" {% if avaliasaun.estudante_id == e.id %}selected{% endif %}>{{ e.naran_estudante }}</option>{% endfor %}</select></div>
<div class="mb-3"><label>Disciplina</label><select name="disciplina" class="form-control" required>{% for d in disciplinas %}<option value="{{ d.id }}" {% if avaliasaun.disciplina_id == d.id %}selected{% endif %}>{{ d.naran_disciplina }}</option>{% endfor %}</select></div>
<div class="mb-3"><label>Nota</label><input type="number" step="0.1" name="nota" class="form-control" value="{{ avaliasaun.nota }}" required></div>
<button type="submit" class="btn btn-warning">Save</button><a href="{% url 'lista_avaliasaun' %}" class="btn btn-secondary">Fila</a>
</form>
{% endblock %}
