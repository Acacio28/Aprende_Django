<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>
<body>
    <div class="container mt-4"></div>
    <h2>Aumenta estudante</h2>
    <form method="POST">
        {%csrf_token%}
        <div class="mb-3">
            <label>NRE</label>
            <input type="text" name="nre" class="form-control">
        </div>
        <div class="mb-3">
            <label>Naran Estudante</label>
            <input type="text" name="naran_estudante" class="form-control">
        </div>
        <div class="mb-3">
            <label>hela_fatin</label>
            <input type="text" name="hela_fatin" class="form-control">
        </div>
        <div class="mb-3">
            <label>nu_telefone</label>
            <input type="text" name="nu_telefone" class="form-control">
        </div>
        <div class="mb-3">
            <label>Sexu</label>
            <select name="sexu" class="form-control">
                <option value="mane">Mane</option>
                <option value="feto">Feto</option>
            </select>
        </div>
        <button type="submit" class="btn btn-succes">Save</button>
        <a href="{% url 'lista'%}" class="btn btn-secondary">Fila</a>

</body>
</html>
